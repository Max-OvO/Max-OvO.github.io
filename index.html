<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Max-OvO Sileo Repo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f2f2f7;
      --card-bg: rgba(255, 255, 255, 0.7);
      --card-border: rgba(0, 0, 0, 0.08);
      --card-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      --card-inset: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      --text: #1c1c1e;
      --text-sub: rgba(60, 60, 67, 0.6);
      --item-bg: rgba(0, 0, 0, 0.03);
      --item-border: rgba(0, 0, 0, 0.06);
      --btn-bg: rgba(0, 0, 0, 0.06);
      --btn-border: rgba(0, 0, 0, 0.1);
      --btn-text: #1c1c1e;
      --btn2-bg: rgba(0, 0, 0, 0.03);
      --btn2-border: rgba(0, 0, 0, 0.06);
      --btn2-text: rgba(60, 60, 67, 0.6);
      --url-text: #007aff;
      --footer: rgba(60, 60, 67, 0.3);
      --toast-bg: rgba(255, 255, 255, 0.8);
      --toast-text: #1c1c1e;
      --avatar-border: rgba(0, 0, 0, 0.1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --card-bg: rgba(255, 255, 255, 0.08);
        --card-border: rgba(255, 255, 255, 0.15);
        --card-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        --card-inset: inset 0 1px 0 rgba(255, 255, 255, 0.15);
        --text: #ffffff;
        --text-sub: rgba(255, 255, 255, 0.5);
        --item-bg: rgba(255, 255, 255, 0.06);
        --item-border: rgba(255, 255, 255, 0.1);
        --btn-bg: rgba(255, 255, 255, 0.12);
        --btn-border: rgba(255, 255, 255, 0.2);
        --btn-text: #ffffff;
        --btn2-bg: rgba(255, 255, 255, 0.04);
        --btn2-border: rgba(255, 255, 255, 0.1);
        --btn2-text: rgba(255, 255, 255, 0.6);
        --url-text: #64d2ff;
        --footer: rgba(255, 255, 255, 0.2);
        --toast-bg: rgba(255, 255, 255, 0.12);
        --toast-text: #ffffff;
        --avatar-border: rgba(255, 255, 255, 0.2);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s;
    }

    .container {
      max-width: 400px;
      width: 88%;
    }

    .liquid-glass {
      background: var(--card-bg);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-radius: 26px;
      padding: 40px 30px 36px;
      text-align: center;
      border: 0.5px solid var(--card-border);
      box-shadow: var(--card-shadow), var(--card-inset);
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 2px solid var(--avatar-border);
      margin-bottom: 16px;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .subtitle {
      color: var(--text-sub);
      font-size: 13px;
      margin-bottom: 28px;
    }

    .categories {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .category {
      flex: 1;
      background: var(--item-bg);
      border: 0.5px solid var(--item-border);
      border-radius: 16px;
      padding: 14px 10px;
    }

    .category .icon {
      font-size: 22px;
      margin-bottom: 4px;
    }

    .category .name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-sub);
    }

    .repo-url {
      background: var(--item-bg);
      border: 0.5px solid var(--item-border);
      border-radius: 14px;
      padding: 14px 16px;
      font-family: 'SF Mono', ui-monospace, monospace;
      font-size: 12.5px;
      color: var(--url-text);
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .copy-hint {
      font-size: 10px;
      color: var(--text-sub);
      font-family: -apple-system, sans-serif;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-primary {
      display: block;
      background: var(--btn-bg);
      border: 0.5px solid var(--btn-border);
      color: var(--btn-text);
      text-decoration: none;
      padding: 15px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
    }

    .btn-secondary {
      display: block;
      background: var(--btn2-bg);
      border: 0.5px solid var(--btn2-border);
      color: var(--btn2-text);
      text-decoration: none;
      padding: 13px;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 500;
    }

    .footer {
      margin-top: 22px;
      font-size: 11px;
      color: var(--footer);
    }

    .toast {
      position: fixed;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--toast-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 0.5px solid var(--card-border);
      color: var(--toast-text);
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="liquid-glass">
      <img class="avatar" src="https://github.com/Max-OvO.png" alt="Avatar">
      <h1>Max-OvO</h1>
      <p class="subtitle">Sileo Repository</p>

      <div class="categories">
        <div class="category">
          <div class="icon">📱</div>
          <div class="name">Rootless</div>
        </div>
        <div class="category">
          <div class="icon">🛡️</div>
          <div class="name">RootHide</div>
        </div>
      </div>

      <div class="repo-url" onclick="copyURL()">
        <span>https://max-ovo.github.io/</span>
        <span class="copy-hint">点击复制</span>
      </div>

      <div class="buttons">
        <a class="btn-primary" href="sileo://source/https://max-ovo.github.io/">Add to Sileo</a>
        <a class="btn-secondary" href="https://github.com/Max-OvO/Max-OvO.github.io" target="_blank">GitHub</a>
      </div>

      <p class="footer">© 2025 Max-OvO</p>
    </div>
  </div>

  <div class="toast" id="toast">✓ 已复制</div>

  <script>
    function copyURL() {
      navigator.clipboard.writeText('https://max-ovo.github.io/');
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1800);
    }
  </script>
</body>
</html>
