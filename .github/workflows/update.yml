name: Update Packages

on:
  push:
    paths:
      - 'Rootless/**'
      - 'RootHide/**'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Packages
        run: |
          rm -f Packages Packages.bz2

          # Rootless 包 - arm64
          for deb in Rootless/*.deb; do
            if [ -f "$deb" ]; then
              dpkg-deb -I "$deb" control | grep -v "^Architecture:" >> Packages
              echo "Architecture: iphoneos-arm64" >> Packages
              echo "Filename: $deb" >> Packages
              echo "Size: $(wc -c < "$deb")" >> Packages
              echo "MD5sum: $(md5sum "$deb" | awk '{print $1}')" >> Packages
              echo "SHA256: $(sha256sum "$deb" | awk '{print $1}')" >> Packages
              echo "" >> Packages
            fi
          done

          # RootHide 包 - arm64e
          for deb in RootHide/*.deb; do
            if [ -f "$deb" ]; then
              dpkg-deb -I "$deb" control | grep -v "^Architecture:" >> Packages
              echo "Architecture: iphoneos-arm64e" >> Packages
              echo "Filename: $deb" >> Packages
              echo "Size: $(wc -c < "$deb")" >> Packages
              echo "MD5sum: $(md5sum "$deb" | awk '{print $1}')" >> Packages
              echo "SHA256: $(sha256sum "$deb" | awk '{print $1}')" >> Packages
              echo "" >> Packages
            fi
          done

          bzip2 -k Packages

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Packages Packages.bz2
          git commit -m "Auto update Packages" || echo "No changes"
          git push
